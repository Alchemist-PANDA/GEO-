name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install application and validation tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install build
      - name: Scan tracked tree for credentials
        run: python scripts/check_secrets.py
      - name: Build Python package
        run: python -m build
      - name: Validate Docker Compose
        env:
          POSTGRES_PASSWORD: ci-only
          REDIS_PASSWORD: ci-only
          GRAFANA_PASSWORD: ci-only
          NEXTAUTH_SECRET: ci-only
          SALT: ci-only
        run: docker compose config --quiet
      - name: Smoke-start API and Streamlit without provider keys
        run: python scripts/smoke_startup.py

  lint-and-test:
    needs: static-gates
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: geo_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy alembic
          pip install redis psycopg2-binary celery

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy geo_audit_agent/ --ignore-missing-imports

      - name: Validate migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geo_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geo_test
          REDIS_URL: redis://localhost:6379/0
          FORCE_MOCK: "true"
        run: pytest tests/ -v --cov=geo_audit_agent --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  guardrail-tests:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run prompt injection regression suite
        env:
          FORCE_MOCK: "true"
        run: pytest tests/test_prompt_injection.py -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, guardrail-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Set Image Name to Lowercase
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${repository%-}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        timeout-minutes: 30
        with:
          context: .
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
