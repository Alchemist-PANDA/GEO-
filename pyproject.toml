[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "brandsight-geo"
version = "1.2.0"
description = "AI-Powered Generative Engine Optimization Dashboard"
requires-python = ">=3.9"
dependencies = [
    "streamlit>=1.30.0",
    "extra-streamlit-components",
    "plotly>=5.0.0",
    "requests>=2.28.0",
    "python-dotenv",
    "langgraph>=0.2.0",
    "pydantic",
    "tenacity",
    "anthropic>=0.52.0",
    "supabase",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
include = ["geo_audit_agent*"]
